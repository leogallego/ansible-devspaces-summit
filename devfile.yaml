schemaVersion: 2.2.2
metadata:
  name: ansible-dev-tools-workspace
components:
  - name: tooling-container
    container:
      image: image-registry.openshift-image-registry.svc:5000/openshift/ansible-devspaces:v26.4.5
      memoryRequest: 2Gi
      memoryLimit: 4Gi
      cpuRequest: 500m
      cpuLimit: 1000m
      env:
        - name: SHELL
          value: /bin/bash
        - name: PROMPT_COMMAND
          value: 'PS1="${VIRTUAL_ENV:+($(basename $VIRTUAL_ENV)) }${PWD#/projects/ansible-dev-tools-workspace/} \$ "'
        - name: ANSIBLE_HOME
          value: /projects/ansible-dev-tools-workspace/.ansible
        - name: HOSTNAME
          value: ansible-devspaces
        - name: VSCODE_DEFAULT_WORKSPACE
          value: /projects/ansible-dev-tools-workspace/devspaces.code-workspace
        - name: ADT_CONTAINER_ENGINE
          value: podman
        - name: ANSIBLE_NAVIGATOR_CONFIG
          value: /projects/ansible-dev-tools-workspace/.ansible-navigator.yml
